version: '3.8'

services:
  app:
    build: .
    container_name: shsimo-app
    restart: always
    ports:
      # 将容器的 3000 端口映射到宿主机的 3000 端口（仅限本地访问，安全起见）
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      # 请将下面的 URL 替换为您已经建好的 PostgreSQL 数据库链接
      - DATABASE_URL=postgresql://username:password@host:5432/dbname
      # 请修改为一个复杂的随机字符串作为 JWT 密钥
      - JWT_SECRET=your_super_secret_jwt_key_2026
