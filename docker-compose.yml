version: '3.8'

services:
  app:
    build: .
    container_name: shsimo-app
    restart: always
    ports:
      # 将宿主机的 54321 端口映射到容器的 54321 端口
      # 仅监听 127.0.0.1，确保外部无法直接绕过反向代理访问
      - "54321:54321"
    environment:
      - NODE_ENV=production
      - PORT=54321
      # 请将下面的 URL 替换为您已经建好的 PostgreSQL 数据库链接
    env_file:
      - .env